# Configuration for the Pocket TTS Speech Dispatcher output module.
#
# This is a Python module process. It re-executes itself with PocketTTSPython
# before loading Pocket TTS, so this should point to the virtual environment
# where pocket-tts is installed.

Debug 0

# Example:
# PocketTTSPython "/home/user/pocket-tts-venv/bin/python"
PocketTTSPython "python3"

# Pocket TTS model language, not a Speech Dispatcher voice locale.
# Use "english", "english_2026-01", "english_2026-04", "french_24l",
# "german_24l", "portuguese", "italian", or "spanish_24l".
PocketTTSLanguage "french_24l"

# Optional fallback voice. Must match PocketTTSLanguage.
# Leave empty to use Pocket TTS' default voice for the configured model language.
PocketTTSDefaultVoice ""

# See Pocket TTS API documentation:
# https://kyutai-labs.github.io/pocket-tts/API%20Reference/Reference/tts_model/
#
# DotConf float values are configured as integer percentages:
# 70 means 0.70, -400 means -4.00.
PocketTTSTemperature 70
PocketTTSLsdDecodeSteps 1
PocketTTSEosThreshold -400
PocketTTSFramesAfterEos -1
PocketTTSMaxTokens 50
PocketTTSQuantize 0

# TODO: add multi-language model switching before declaring non-French voices.
# The module currently loads one Pocket TTS model at startup.
AddVoice "fr"    "FEMALE1" "estelle"
AddVoice "fr_FR" "FEMALE1" "estelle"
AddVoice "fr-FR" "FEMALE1" "estelle"

